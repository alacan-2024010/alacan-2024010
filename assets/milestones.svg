<svg width="100%" viewBox="0 0 1200 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tlbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#12233b"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="1198" height="178" rx="20" fill="url(#tlbg)" stroke="#2b2450" stroke-width="1.5"/>

  <text x="600" y="38" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="20" font-weight="700" fill="#F1F5F9">Mi trayectoria</text>

  <!-- connecting line -->
  <line x1="160" y1="105" x2="1040" y2="105" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round"/>

  <!-- node 1 -->
  <circle cx="220" cy="105" r="10" fill="#0F172A" stroke="#34D399" stroke-width="3"/>
  <text x="220" y="70" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="22">🎓</text>
  <text x="220" y="135" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#34D399">2024</text>
  <text x="220" y="155" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" fill="#94A3B8">Inicio en Fundación Kinal</text>

  <!-- node 2 -->
  <circle cx="600" cy="105" r="10" fill="#0F172A" stroke="#A78BFA" stroke-width="3"/>
  <text x="600" y="70" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="22">🏅</text>
  <text x="600" y="135" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#A78BFA">2024</text>
  <text x="600" y="155" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" fill="#94A3B8">Certificación IT Essentials</text>

  <!-- node 3 -->
  <circle cx="980" cy="105" r="10" fill="#0F172A" stroke="#7C3AED" stroke-width="3"/>
  <text x="980" y="70" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="22">🚩</text>
  <text x="980" y="135" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#C4B5FD">2026</text>
  <text x="980" y="155" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" fill="#94A3B8">Meta: graduarme y hacer la práctica</text>
</svg>
