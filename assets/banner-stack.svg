  <text x="106" y="45" font-family="Segoe UI, sans-serif" font-size="26" font-weight="800" fill="#F1F5F9">Stack &amp; Herramientas</text>
  <text x="106" y="72" font-family="Segoe UI, sans-serif" font-size="20" fill="#94A3B8">de la interfaz al dato, capa por capa</text>

  <!-- decorative nodes -->
