<svg width="100%" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="55%" stop-color="#1E1B3A"/>
      <stop offset="100%" stop-color="#1a1035"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="55%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#A78BFA" fill-opacity="0.18"/>
    </pattern>
  </defs>

  <rect width="1200" height="280" rx="18" fill="url(#bgGrad)"/>
  <rect width="1200" height="280" rx="18" fill="url(#glow)"/>
  <rect x="0" y="0" width="1200" height="280" rx="18" fill="url(#dots)"/>

  <!-- decorative code glyph -->
  <text x="960" y="230" font-family="Consolas, monospace" font-size="180" fill="#7C3AED" fill-opacity="0.10" font-weight="700">&lt;/&gt;</text>

  <!-- left accent bar -->
  <rect x="0" y="0" width="10" height="280" rx="5" fill="url(#barGrad)"/>

  <!-- name -->
  <text x="60" y="130" font-family="Segoe UI, sans-serif" font-size="56" font-weight="800" fill="url(#nameGrad)">Alan Lacán Flores</text>

  <!-- role -->
  <text x="62" y="168" font-family="Segoe UI, sans-serif" font-size="22" fill="#CBD5E1">Backend Developer &#183; Arquitectura de sistemas</text>

  <!-- location pill -->
  <rect x="60" y="196" width="118" height="34" rx="17" fill="#7C3AED" fill-opacity="0.15" stroke="#A78BFA" stroke-width="1"/>
  <text x="78" y="219" font-family="Segoe UI, sans-serif" font-size="15" fill="#A78BFA">📍 Guatemala</text>

  <!-- tag pills -->
  <g font-family="Segoe UI, sans-serif" font-size="14" fill="#E2E8F0">
    <rect x="192" y="196" width="88" height="34" rx="17" fill="#0F172A" stroke="#334155"/>
    <text x="208" y="219">Java</text>

    <rect x="290" y="196" width="130" height="34" rx="17" fill="#0F172A" stroke="#334155"/>
    <text x="306" y="219">Spring Boot</text>

    <rect x="430" y="196" width="98" height="34" rx="17" fill="#0F172A" stroke="#334155"/>
    <text x="446" y="219">React</text>

    <rect x="538" y="196" width="112" height="34" rx="17" fill="#0F172A" stroke="#334155"/>
    <text x="554" y="219">Node.js</text>

    <rect x="660" y="196" width="140" height="34" rx="17" fill="#0F172A" stroke="#334155"/>
    <text x="676" y="219">PostgreSQL</text>

    <rect x="810" y="196" width="112" height="34" rx="17" fill="#0F172A" stroke="#334155"/>
    <text x="826" y="219">Docker</text>
  </g>
</svg>
